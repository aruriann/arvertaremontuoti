<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puslapis nerastas | Ar verta remontuoti?</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .icon  { font-size: 4rem; margin-bottom: 16px; }
    h1     { font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; }
    p      { color: #64748b; font-size: 1rem; line-height: 1.6; max-width: 400px; margin-bottom: 28px; }
    a.btn  {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: .95rem;
      padding: 12px 28px;
      border-radius: 8px;
    }
    a.btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="icon">🚗</div>
  <h1>Puslapis nerastas</h1>
  <p>Atsiprašome, tokio puslapio nėra. Galbūt nuoroda paseno arba buvo įvesta klaidingai.</p>
  <a class="btn" href="/">Grįžti į pradžią</a>
</body>
</html>
